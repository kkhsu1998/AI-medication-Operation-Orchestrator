openapi: 3.0.3
info:
  title: MedOps Orchestrator API
  description: |
    AI-driven medication operations platform with deterministic decision logic,
    human-in-the-loop approval, and complete audit trail.
    
    All endpoints return ISO 8601 timestamps (UTC).
    All monetary values in USD. All quantities in units.
    All IDs are UUIDs v4 or correlation_ids (alphanumeric).
  version: 1.0.0
  contact:
    name: MedOps Team
servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://api.medops.example.com
    description: Production

paths:
  /health:
    get:
      summary: Health check
      operationId: health_check
      tags:
        - System
      responses:
        '200':
          description: System healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                  database:
                    type: string
                    enum: [connected]
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/scenarios:
    get:
      summary: List all demo scenarios
      operationId: list_scenarios
      tags:
        - Scenarios
      responses:
        '200':
          description: List of scenarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Scenario'

  /api/v1/scenarios/{scenario_id}:
    get:
      summary: Get scenario detail
      operationId: get_scenario
      tags:
        - Scenarios
      parameters:
        - name: scenario_id
          in: path
          required: true
          schema:
            type: integer
            example: 1
      responses:
        '200':
          description: Scenario detail with current workflow state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ScenarioDetail'
        '404':
          description: Scenario not found

  /api/v1/scenarios/{scenario_id}/run:
    post:
      summary: Trigger a scenario's detection event
      operationId: run_scenario
      tags:
        - Scenarios
      parameters:
        - name: scenario_id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                override_config:
                  type: object
                  description: Optional config overrides for this run
              example:
                override_config:
                  safety_stock_multiplier: 1.5
      responses:
        '202':
          description: Scenario execution started
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_id:
                    type: string
                    format: uuid
                  correlation_id:
                    type: string
                  status:
                    type: string
                    enum: [detected]
                  started_at:
                    type: string
                    format: date-time

  /api/v1/workflows/{workflow_id}:
    get:
      summary: Get workflow state and recommendation
      operationId: get_workflow
      tags:
        - Workflows
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Workflow state with full context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowState'
        '404':
          description: Workflow not found

  /api/v1/workflows/{workflow_id}/approve:
    post:
      summary: Approve a recommendation
      operationId: approve_recommendation
      tags:
        - Workflows
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approver_role:
                  type: string
                  enum: [Manager, Pharmacist, Clinician]
                approver_id:
                  type: string
                  description: Optional user ID / email
                  example: alice@hospital.example.com
              required:
                - approver_role
      responses:
        '200':
          description: Recommendation approved, task created
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [approved, task_created]
                  task_id:
                    type: string
                    format: uuid
                  task_status:
                    type: string
                    enum: [requested, assigned, accepted, in_progress, completed, failed, escalated]
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid approver_role or workflow not in pending_approval state
        '409':
          description: Workflow state conflict (e.g., already approved/rejected)

  /api/v1/workflows/{workflow_id}/reject:
    post:
      summary: Reject a recommendation
      operationId: reject_recommendation
      tags:
        - Workflows
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                approver_role:
                  type: string
                  enum: [Manager, Pharmacist, Clinician]
                approver_id:
                  type: string
                reason:
                  type: string
                  enum:
                    - Insufficient lead-time margin
                    - Cost exceeds budget threshold
                    - Prefer alternate supplier
                    - Clinical / operational override
                    - Other — needs review
              required:
                - approver_role
                - reason
      responses:
        '200':
          description: Recommendation rejected, recalculation triggered or escalated
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [rejected, pending_approval, escalated]
                  rejection_count:
                    type: integer
                  next_version:
                    type: integer
                    description: New recommendation version if recalculation triggered
                  timestamp:
                    type: string
                    format: date-time
        '400':
          description: Invalid reason or approver_role
        '409':
          description: Workflow not in pending_approval state

  /api/v1/workflows/{workflow_id}/escalate:
    post:
      summary: Manually escalate a workflow (e.g., after delivery failure)
      operationId: escalate_workflow
      tags:
        - Workflows
      parameters:
        - name: workflow_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  example: Courier unavailable mid-task
              required:
                - reason
      responses:
        '200':
          description: Workflow escalated
          content:
            application/json:
              schema:
                type: object
                properties:
                  workflow_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [escalated]
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/tasks/{task_id}:
    get:
      summary: Get task status
      operationId: get_task
      tags:
        - Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found

  /api/v1/tasks/{task_id}/reassign:
    post:
      summary: Reassign a failed task to a different courier/AMR
      operationId: reassign_task
      tags:
        - Tasks
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task reassigned
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  status:
                    type: string
                    enum: [requested, assigned]
                  timestamp:
                    type: string
                    format: date-time

  /api/v1/kpi:
    get:
      summary: Get all operational KPIs
      operationId: get_kpis
      tags:
        - KPI
      parameters:
        - name: time_window_days
          in: query
          schema:
            type: integer
            default: 1
            description: Lookback window for aggregation (days)
      responses:
        '200':
          description: All KPIs calculated from event log
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KPIs'

  /api/v1/audit:
    get:
      summary: Get approval audit trail
      operationId: get_audit_trail
      tags:
        - Audit
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: List of approval decisions
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ApprovalDecision'

  /api/v1/config:
    get:
      summary: Get current configuration
      operationId: get_config
      tags:
        - Configuration
      responses:
        '200':
          description: Configuration values
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
    patch:
      summary: Update configuration (admin only)
      operationId: update_config
      tags:
        - Configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                safety_stock_multiplier:
                  type: number
                expiration_risk_horizon_days:
                  type: integer
                minutes_per_manual_step:
                  type: integer
      responses:
        '200':
          description: Configuration updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Config'
        '403':
          description: Unauthorized

components:
  schemas:
    Scenario:
      type: object
      properties:
        id:
          type: integer
        tag:
          type: string
          example: "Prevent shortage through internal transfer"
        drug:
          type: string
          example: "Vancomycin IV 1g"
        narrative:
          type: string
        approver_role:
          type: string
          enum: [Manager, Pharmacist]
        correlation_id:
          type: string
      required:
        - id
        - tag
        - drug
        - correlation_id

    ScenarioDetail:
      allOf:
        - $ref: '#/components/schemas/Scenario'
        - type: object
          properties:
            current_workflow_id:
              type: string
              format: uuid
              nullable: true
            current_stage:
              type: string
              enum: [detected, agents_consulted, options_ranked, pending_approval, approved, task_created, in_progress, completed, rejected, escalated]
              nullable: true

    WorkflowState:
      type: object
      properties:
        workflow_id:
          type: string
          format: uuid
        correlation_id:
          type: string
        drug:
          type: string
        stage:
          type: string
          enum: [detected, agents_consulted, options_ranked, pending_approval, approved, task_created, in_progress, completed, rejected, escalated]
        version:
          type: integer
        detected_at:
          type: string
          format: date-time
        options_ranked_at:
          type: string
          format: date-time
          nullable: true
        pending_approval_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        
        # Full recommendation payload (only if stage >= options_ranked)
        recommendation:
          $ref: '#/components/schemas/Recommendation'
          nullable: true
        
        # Only if stage == pending_approval or later
        approval_decision:
          $ref: '#/components/schemas/ApprovalDecision'
          nullable: true
        
        # Only if stage == task_created or later
        task_id:
          type: string
          format: uuid
          nullable: true

    Recommendation:
      type: object
      properties:
        recommendation_id:
          type: string
          format: uuid
        version:
          type: integer
        drug:
          type: string
        problem_type:
          type: string
          enum: [shortage, excess, expiration, supplier_delay]
        
        ranked_options:
          type: array
          items:
            $ref: '#/components/schemas/RankedOption'
        
        rejected_options:
          type: array
          items:
            $ref: '#/components/schemas/RejectedOption'
        
        # Scoring model metadata
        scoring_weights:
          type: object
          properties:
            availability:
              type: number
              example: 0.40
            lead_time:
              type: number
              example: 0.25
            cost:
              type: number
              example: 0.20
            waste_reduction:
              type: number
              example: 0.15
        
        # Full input snapshot used for decision
        input_snapshot:
          type: object
          description: Inventory, supplier, delivery state at decision time
          additionalProperties: true
        
        policy_version:
          type: string
          example: "policy v1.3"
        
        generated_at:
          type: string
          format: date-time

    RankedOption:
      type: object
      properties:
        option_id:
          type: string
          enum: [transfer, procurement]
        label:
          type: string
          example: "Internal transfer: Central Warehouse → Ward A (300 units)"
        feasible:
          type: boolean
        
        # Score components (only if feasible)
        score:
          type: integer
          minimum: 0
          maximum: 100
          nullable: true
        
        availability_protection:
          type: number
          minimum: 0
          maximum: 1
          nullable: true
        
        lead_time_margin_days:
          type: integer
          nullable: true
        
        cost_usd:
          type: number
          nullable: true
        
        waste_avoided_units:
          type: integer
          nullable: true
        
        agent_responsible:
          type: string
          example: "Inventory + Delivery"

    RejectedOption:
      type: object
      properties:
        option_id:
          type: string
        label:
          type: string
        reason:
          type: string
          example: "Supplier ETA (5 days) exceeds projected stockout date (3 days)."

    ApprovalDecision:
      type: object
      properties:
        decision_id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        recommendation_id:
          type: string
          format: uuid
        recommendation_version:
          type: integer
        
        approver_role:
          type: string
          enum: [Manager, Pharmacist, Clinician]
        approver_id:
          type: string
          nullable: true
        
        decision:
          type: string
          enum: [approved, rejected, escalated]
        
        reason:
          type: string
          nullable: true
          description: Required for reject. Optional for escalate.
        
        policy_version:
          type: string
        
        decided_at:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        task_id:
          type: string
          format: uuid
        correlation_id:
          type: string
          description: Idempotency key for duplicate detection
        workflow_id:
          type: string
          format: uuid
        
        drug:
          type: string
        task_type:
          type: string
          enum: [transfer, procurement]
        
        status:
          type: string
          enum: [requested, assigned, accepted, in_progress, delayed, completed, failed, escalated]
        
        # Delivery/transfer specifics
        source_location:
          type: string
          nullable: true
        destination_location:
          type: string
          nullable: true
        quantity:
          type: integer
        estimated_delivery_hours:
          type: integer
          nullable: true
        
        # Procurement specifics
        supplier_name:
          type: string
          nullable: true
        estimated_arrival_date:
          type: string
          format: date-time
          nullable: true
        
        # Progress
        steps_completed:
          type: array
          items:
            type: string
          example: [requested, assigned, accepted]
        
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    KPIs:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        time_window_days:
          type: integer
        
        problems_detected:
          type: integer
        recommendations_generated:
          type: integer
        recommendation_acceptance_rate_pct:
          type: number
          format: double
        
        false_positive_rate_pct:
          type: number
          format: double
          description: Rejections with reason='wrong calculation'
        
        latency_detection_to_recommendation_sec:
          type: object
          properties:
            median:
              type: number
            p95:
              type: number
        
        latency_recommendation_to_approval_sec:
          type: object
          properties:
            median:
              type: number
            p95:
              type: number
        
        latency_approval_to_task_creation_sec:
          type: number
        
        latency_task_completion_sec:
          type: object
          properties:
            median:
              type: number
            p95:
              type: number
        
        task_completion_rate_pct:
          type: number
          format: double
        
        manual_coordination_steps_avoided:
          type: integer
        
        estimated_operations_minutes_saved:
          type: number
          description: manual_coordination_steps_avoided × minutes_per_step config
        
        medication_availability_rate_pct:
          type: number
          format: double
        
        potential_stockouts_addressed:
          type: integer
        
        simulated_stockouts_prevented:
          type: integer
        
        expiration_risk_quantity_redistributed:
          type: integer
        
        transfer_vs_procurement_ratio:
          type: number
          format: double
        
        invalid_recommendations_blocked:
          type: integer

    Config:
      type: object
      properties:
        safety_stock_multiplier:
          type: number
          example: 1.2
        days_of_supply_minimum:
          type: integer
          example: 3
        expiration_risk_horizon_days:
          type: integer
          example: 14
        lead_time_buffer_days:
          type: integer
          example: 1
        
        scoring_weights:
          type: object
          properties:
            availability:
              type: number
            lead_time:
              type: number
            cost:
              type: number
            waste_reduction:
              type: number
        
        minimum_feasibility_score:
          type: integer
          example: 50
        
        retry_limit_delivery:
          type: integer
          example: 3
        
        minutes_per_manual_coordination_step:
          type: integer
          example: 15
        
        updated_at:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Optional JWT token for API authentication (future)
