openapi: 3.1.0
info:
  title: MedOps API
  version: 0.1.0
paths:
  /api/v1/stock:
    get:
      tags:
      - stock
      summary: List Stock
      operationId: list_stock_api_v1_stock_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 2000
          default: 200
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      - name: drug
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Drug
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Q
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Stock Api V1 Stock Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    post:
      tags:
      - stock
      summary: Add Stock
      operationId: add_stock_api_v1_stock_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRow'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Add Stock Api V1 Stock Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - stock
      summary: Replace Stock
      description: Full replace — used on import. Heavy; prefer PATCH for single edits.
      operationId: replace_stock_api_v1_stock_put
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockPut'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Replace Stock Api V1 Stock Put
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stock/{item_id}:
    patch:
      tags:
      - stock
      summary: Update Stock
      operationId: update_stock_api_v1_stock__item_id__patch
      parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: integer
          title: Item Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StockRowUpdate'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Update Stock Api V1 Stock  Item Id  Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - stock
      summary: Delete Stock
      operationId: delete_stock_api_v1_stock__item_id__delete
      parameters:
      - name: item_id
        in: path
        required: true
        schema:
          type: integer
          title: Item Id
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Delete Stock Api V1 Stock  Item Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/stock/summary:
    get:
      tags:
      - stock
      summary: Stock Summary
      operationId: stock_summary_api_v1_stock_summary_get
      parameters:
      - name: drug
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Drug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Stock Summary Api V1 Stock Summary Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/fhir/InventoryItem:
    get:
      tags:
      - stock
      summary: Fhir Inventory
      operationId: fhir_inventory_api_v1_fhir_InventoryItem_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 5000
          default: 500
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Fhir Inventory Api V1 Fhir Inventoryitem Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/forecast/predict:
    post:
      tags:
      - forecasting
      summary: Predict
      description: Forecast `steps` ahead from a raw numeric series using the chosen
        model.
      operationId: predict_api_v1_forecast_predict_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PredictIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Predict Api V1 Forecast Predict Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/forecast/overview:
    get:
      tags:
      - forecasting
      summary: Overview
      operationId: overview_api_v1_forecast_overview_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Overview Api V1 Forecast Overview Get
  /api/v1/forecast/item:
    get:
      tags:
      - forecasting
      summary: Item
      operationId: item_api_v1_forecast_item_get
      parameters:
      - name: drug
        in: query
        required: true
        schema:
          type: string
          title: Drug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Item Api V1 Forecast Item Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/forecast/features:
    get:
      tags:
      - forecasting
      summary: Feature Options
      description: Describe the features/encoders available to the workbench.
      operationId: feature_options_api_v1_forecast_features_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Feature Options Api V1 Forecast Features Get
  /api/v1/forecast/train:
    post:
      tags:
      - forecasting
      summary: Train
      description: Train a multivariate model on the chosen feature lattice and forecast.
      operationId: train_api_v1_forecast_train_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TrainIn'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Train Api V1 Forecast Train Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/forecast/sample:
    get:
      tags:
      - forecasting
      summary: Sample
      description: 'Recent rows of the (date, location, quantity) panel for a drug
        — the raw

        data the feature-lattice table is built from (column headers are the fields).'
      operationId: sample_api_v1_forecast_sample_get
      parameters:
      - name: drug
        in: query
        required: true
        schema:
          type: string
          title: Drug
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 1000
          default: 200
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Sample Api V1 Forecast Sample Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/dashboard:
    get:
      tags:
      - dashboard
      summary: Dashboard
      operationId: dashboard_api_v1_dashboard_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Dashboard Api V1 Dashboard Get
  /api/v1/orchestrator/issues:
    get:
      tags:
      - orchestrator
      summary: Issues
      operationId: issues_api_v1_orchestrator_issues_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Issues Api V1 Orchestrator Issues Get
  /api/v1/orchestrator/decision:
    post:
      tags:
      - orchestrator
      summary: Decide
      operationId: decide_api_v1_orchestrator_decision_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Decision'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Decide Api V1 Orchestrator Decision Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/audit:
    get:
      tags:
      - audit
      summary: List Audit
      operationId: list_audit_api_v1_audit_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 500
          default: 100
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          default: 0
          title: Offset
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Audit Api V1 Audit Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/changepoints:
    post:
      tags:
      - audit
      summary: Create Change Point
      description: Record a change point (a timestamped history step). Returns its
        change_id.
      operationId: create_change_point_api_v1_changepoints_post
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePointIn'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Change Point Api V1 Changepoints Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    get:
      tags:
      - audit
      summary: List Change Points
      description: Recent change points (newest first) — used by the pages to mark
        real changes.
      operationId: list_change_points_api_v1_changepoints_get
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          default: 50
          title: Limit
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response List Change Points Api V1 Changepoints Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/v1/settings:
    get:
      tags:
      - settings
      summary: Get Settings
      operationId: get_settings_api_v1_settings_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Get Settings Api V1 Settings Get
    patch:
      tags:
      - settings
      summary: Patch Settings
      operationId: patch_settings_api_v1_settings_patch
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SettingsPatch'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Patch Settings Api V1 Settings Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /health:
    get:
      summary: Health
      operationId: health_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                additionalProperties: true
                type: object
                title: Response Health Health Get
components:
  schemas:
    ChangePointIn:
      properties:
        action:
          type: string
          title: Action
        source:
          type: string
          title: Source
          default: mcp
        target:
          type: string
          title: Target
          default: ''
        detail:
          type: string
          title: Detail
          default: ''
      type: object
      required:
      - action
      title: ChangePointIn
    Decision:
      properties:
        issue_id:
          type: string
          title: Issue Id
        drug:
          type: string
          title: Drug
          default: ''
        location:
          type: string
          title: Location
          default: ''
        option_type:
          type: string
          title: Option Type
          default: ''
        decision:
          type: string
          enum:
          - approved
          - rejected
          title: Decision
        reason:
          type: string
          title: Reason
          default: ''
        approver_role:
          type: string
          title: Approver Role
          default: Manager
      type: object
      required:
      - issue_id
      - decision
      title: Decision
    FeatureSpecIn:
      properties:
        type:
          type: string
          title: Type
        lag:
          anyOf:
          - type: integer
          - type: 'null'
          title: Lag
        kind:
          anyOf:
          - type: string
          - type: 'null'
          title: Kind
        column:
          anyOf:
          - type: string
          - type: 'null'
          title: Column
        encoder:
          anyOf:
          - type: string
          - type: 'null'
          title: Encoder
        name:
          anyOf:
          - type: string
          - type: 'null'
          title: Name
        formula:
          anyOf:
          - type: string
          - type: 'null'
          title: Formula
      type: object
      required:
      - type
      title: FeatureSpecIn
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    PredictIn:
      properties:
        series:
          items:
            type: number
          type: array
          title: Series
          default: []
        steps:
          type: integer
          title: Steps
          default: 14
        model:
          type: string
          title: Model
          default: xgboost
        lags:
          anyOf:
          - type: integer
          - type: 'null'
          title: Lags
      type: object
      title: PredictIn
    SettingsPatch:
      properties:
        values:
          additionalProperties:
            type: number
          type: object
          title: Values
          default: {}
      type: object
      title: SettingsPatch
    StockPut:
      properties:
        items:
          items:
            $ref: '#/components/schemas/StockRow'
          type: array
          title: Items
          default: []
      type: object
      title: StockPut
      description: Full-sheet replace payload — used on import.
    StockRow:
      properties:
        drug:
          type: string
          title: Drug
          default: ''
        location:
          type: string
          title: Location
          default: ''
        on_hand:
          anyOf:
          - type: number
          - type: string
          - type: 'null'
          title: On Hand
        unit:
          type: string
          title: Unit
          default: ''
        expiry_date:
          type: string
          title: Expiry Date
          default: ''
        avg_daily_use:
          anyOf:
          - type: number
          - type: string
          - type: 'null'
          title: Avg Daily Use
        supplier:
          type: string
          title: Supplier
          default: ''
        last_delivery:
          type: string
          title: Last Delivery
          default: ''
      type: object
      title: StockRow
      description: One inventory row as the grid sends it (numbers may arrive as strings).
    StockRowUpdate:
      properties:
        drug:
          anyOf:
          - type: string
          - type: 'null'
          title: Drug
        location:
          anyOf:
          - type: string
          - type: 'null'
          title: Location
        on_hand:
          anyOf:
          - type: number
          - type: string
          - type: 'null'
          title: On Hand
        unit:
          anyOf:
          - type: string
          - type: 'null'
          title: Unit
        expiry_date:
          anyOf:
          - type: string
          - type: 'null'
          title: Expiry Date
        avg_daily_use:
          anyOf:
          - type: number
          - type: string
          - type: 'null'
          title: Avg Daily Use
        supplier:
          anyOf:
          - type: string
          - type: 'null'
          title: Supplier
        last_delivery:
          anyOf:
          - type: string
          - type: 'null'
          title: Last Delivery
      type: object
      title: StockRowUpdate
      description: Partial update for a single cell/row edit — only provided fields
        change.
    TrainIn:
      properties:
        drug:
          type: string
          title: Drug
        steps:
          type: integer
          title: Steps
          default: 14
        model:
          type: string
          title: Model
          default: xgboost
        normalization:
          type: string
          title: Normalization
          default: standard
        features:
          items:
            $ref: '#/components/schemas/FeatureSpecIn'
          type: array
          title: Features
          default: []
      type: object
      required:
      - drug
      title: TrainIn
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
