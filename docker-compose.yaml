services:
  # PostgreSQL — persistent data. The backend creates tables (and seeds
  # synthetic data when empty) on startup, so no init SQL is needed.
  postgres:
    image: postgres:15-alpine
    container_name: medops-postgres
    environment:
      POSTGRES_DB: medops
      POSTGRES_USER: medops
      POSTGRES_PASSWORD: ${DB_PASSWORD:-medops-dev-only}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medops"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - medops-network

  # FastAPI backend (forecasting, stock, orchestrator, audit, settings, FHIR)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medops-backend
    environment:
      DATABASE_URL: postgresql+psycopg2://medops:${DB_PASSWORD:-medops-dev-only}@postgres:5432/medops
      # Seed sizes (only applied when the tables are empty)
      MEDOPS_AUTOSEED: ${MEDOPS_AUTOSEED:-1}
      MEDOPS_SEED_INVENTORY: ${MEDOPS_SEED_INVENTORY:-100000}
      MEDOPS_SEED_CONSUMPTION: ${MEDOPS_SEED_CONSUMPTION:-100000}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - medops-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # React frontend — Vite build served by nginx, which proxies /api → backend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medops-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - medops-network

  # Optional: Adminer for database inspection
  adminer:
    image: adminer:latest
    container_name: medops-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    networks:
      - medops-network

volumes:
  postgres_data:
    driver: local

networks:
  medops-network:
    driver: bridge

# Usage:
#   docker compose up --build
#   Frontend:  http://localhost:3000
#   API:       http://localhost:8000  (docs at /docs)
#   Adminer:   http://localhost:8080
# First backend start seeds 100K inventory + 100K consumption rows.
