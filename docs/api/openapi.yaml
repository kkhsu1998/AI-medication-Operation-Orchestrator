openapi: "3.1.0"
info:
  title: Medication Operations Platform API
  version: "1.0.0"
  description: |
    REST API contract for the AI-Driven Medication Operations and Task
    Management Platform. This is a prototype — not a production medical
    device or autonomous purchasing system.

    All responses containing recommendations include `demand_signal_source`.
    Recommendations missing this field must not be presented to approvers.

    All timestamps are ISO-8601 UTC.
    All IDs are UUIDv4.
    All synthetic data is labeled with `is_synthetic: true` in responses.

servers:
  - url: http://localhost:8000
    description: Local Docker Compose development

tags:
  - name: Recommendations
    description: View and manage operational recommendations
  - name: Approvals
    description: Human approval workflow
  - name: Tasks
    description: Task creation, tracking, and state management
  - name: Scenarios
    description: Demo scenario execution and status
  - name: Detection
    description: Detection event queries
  - name: Forecasting
    description: Demand signal and forecast data
  - name: KPIs
    description: Key Performance Indicators

paths:
  # =========================================================================
  # RECOMMENDATIONS
  # =========================================================================
  /api/v1/recommendations:
    get:
      operationId: listRecommendations
      tags: [Recommendations]
      summary: List recommendations with optional filters
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/OrchestratorState"
        - name: medication_id
          in: query
          schema:
            type: string
            format: uuid
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationListResponse"

  /api/v1/recommendations/{recommendation_id}:
    get:
      operationId: getRecommendation
      tags: [Recommendations]
      summary: Get a single recommendation with full detail
      parameters:
        - name: recommendation_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Full recommendation detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  # =========================================================================
  # APPROVALS
  # =========================================================================
  /api/v1/approvals/pending:
    get:
      operationId: listPendingApprovals
      tags: [Approvals]
      summary: List recommendations awaiting human approval
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
      responses:
        "200":
          description: Paginated list of pending recommendations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecommendationListResponse"

  /api/v1/approvals:
    post:
      operationId: submitApproval
      tags: [Approvals]
      summary: Submit an approval or rejection decision
      description: |
        Records the human decision. On approval, triggers orchestrator
        transition to `approved` and subsequent task creation.
        On rejection, transitions to `escalated`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalRequest"
      responses:
        "201":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Recommendation already has a decision
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/approvals/{approval_id}:
    get:
      operationId: getApproval
      tags: [Approvals]
      summary: Get approval decision detail
      parameters:
        - name: approval_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Approval detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  # =========================================================================
  # TASKS
  # =========================================================================
  /api/v1/tasks:
    get:
      operationId: listTasks
      tags: [Tasks]
      summary: List tasks with optional filters
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: state
          in: query
          schema:
            $ref: "#/components/schemas/DeliveryTaskState"
        - name: task_type
          in: query
          schema:
            $ref: "#/components/schemas/OptionType"
        - name: medication_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated list of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"

  /api/v1/tasks/{task_id}:
    get:
      operationId: getTask
      tags: [Tasks]
      summary: Get full task detail including state history
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Task detail with state log
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/tasks/{task_id}/transition:
    post:
      operationId: transitionTask
      tags: [Tasks]
      summary: Trigger a task state transition
      description: |
        Used by delivery/AMR adapter callbacks and manual intervention.
        Only valid transitions per the delivery task state machine are
        accepted (ADR-002).
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskTransitionRequest"
      responses:
        "200":
          description: Transition accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invalid state transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # =========================================================================
  # SCENARIOS
  # =========================================================================
  /api/v1/scenarios:
    get:
      operationId: listScenarios
      tags: [Scenarios]
      summary: List all 7 demo scenarios with status
      responses:
        "200":
          description: All scenarios
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioListResponse"

  /api/v1/scenarios/{scenario_number}:
    get:
      operationId: getScenario
      tags: [Scenarios]
      summary: Get scenario detail and last run status
      parameters:
        - name: scenario_number
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 7
      responses:
        "200":
          description: Scenario detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioDetail"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/v1/scenarios/{scenario_number}/run:
    post:
      operationId: runScenario
      tags: [Scenarios]
      summary: Execute a demo scenario end-to-end
      description: |
        Triggers a full scenario run (detection -> approval -> task completion).
        Returns immediately with a run ID; poll the scenario detail for status.
        All data generated is labeled as synthetic.
      parameters:
        - name: scenario_number
          in: path
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 7
      responses:
        "202":
          description: Scenario execution started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioRunResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Scenario already running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # =========================================================================
  # DETECTION
  # =========================================================================
  /api/v1/detection/events:
    get:
      operationId: listDetectionEvents
      tags: [Detection]
      summary: List recent detection events
      parameters:
        - $ref: "#/components/parameters/PageParam"
        - $ref: "#/components/parameters/PageSizeParam"
        - name: detection_type
          in: query
          schema:
            $ref: "#/components/schemas/DetectionType"
        - name: medication_id
          in: query
          schema:
            type: string
            format: uuid
        - name: location_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated detection events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DetectionEventListResponse"

  # =========================================================================
  # FORECASTING
  # =========================================================================
  /api/v1/forecasting/demand-signal:
    get:
      operationId: getDemandSignal
      tags: [Forecasting]
      summary: Get current demand signal for a medication+location
      parameters:
        - name: medication_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: start_date
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: end_date
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Demand signal (always returns, never errors on ML unavailability)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DemandSignalResponse"

  /api/v1/forecasting/points:
    get:
      operationId: getForecastPoints
      tags: [Forecasting]
      summary: Get cached forecast points [p10, p50, p90]
      parameters:
        - name: medication_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: location_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: horizon_days
          in: query
          schema:
            type: integer
            default: 7
            minimum: 1
            maximum: 30
      responses:
        "200":
          description: Forecast data points
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForecastPointsResponse"

  # =========================================================================
  # KPIs
  # =========================================================================
  /api/v1/kpis:
    get:
      operationId: listKpis
      tags: [KPIs]
      summary: Get latest KPI snapshots
      parameters:
        - name: kpi_name
          in: query
          schema:
            type: string
        - name: start
          in: query
          schema:
            type: string
            format: date-time
        - name: end
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: KPI snapshots
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KpiListResponse"

# =============================================================================
# COMPONENTS
# =============================================================================
components:
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
    PageSizeParam:
      name: page_size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100

  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"

  schemas:
    # -----------------------------------------------------------------------
    # Enums
    # -----------------------------------------------------------------------
    DemandSignalSource:
      type: string
      enum: [ml_forecast, deterministic_baseline]

    OrchestratorState:
      type: string
      enum:
        - detected
        - agents_consulted
        - options_ranked
        - pending_approval
        - approved
        - task_created
        - in_progress
        - completed
        - escalated

    DeliveryTaskState:
      type: string
      enum:
        - requested
        - assigned
        - accepted
        - in_progress
        - completed
        - failed
        - escalated

    OptionType:
      type: string
      enum: [internal_transfer, procurement, escalation]

    DetectionType:
      type: string
      enum:
        - low_days_of_supply
        - projected_stockout
        - excess_inventory
        - expiration_risk
        - supplier_shortage
        - delayed_replenishment
        - failed_delivery

    ApprovalDecisionEnum:
      type: string
      enum: [approved, rejected]

    # -----------------------------------------------------------------------
    # Core Response Schemas
    # -----------------------------------------------------------------------
    ErrorResponse:
      type: object
      required: [error, detail]
      properties:
        error:
          type: string
        detail:
          type: string

    PaginationMeta:
      type: object
      required: [page, page_size, total_count, total_pages]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total_count:
          type: integer
        total_pages:
          type: integer

    # -----------------------------------------------------------------------
    # Recommendation Schemas
    # -----------------------------------------------------------------------
    ScoringWeights:
      type: object
      required: [availability, lead_time, cost, waste_reduction]
      properties:
        availability:
          type: number
          example: 0.40
        lead_time:
          type: number
          example: 0.25
        cost:
          type: number
          example: 0.20
        waste_reduction:
          type: number
          example: 0.15

    ScoringBreakdown:
      type: object
      required:
        - availability_score
        - lead_time_score
        - cost_score
        - waste_reduction_score
        - weighted_total
      properties:
        availability_score:
          type: number
        lead_time_score:
          type: number
        cost_score:
          type: number
        waste_reduction_score:
          type: number
        weighted_total:
          type: number

    RejectedOption:
      type: object
      required: [option_type, reason, feasibility_passed]
      properties:
        option_type:
          $ref: "#/components/schemas/OptionType"
        reason:
          type: string
        score:
          type: number
          nullable: true
        feasibility_passed:
          type: boolean

    RecommendationDetail:
      type: object
      required:
        - recommendation_id
        - workflow_id
        - correlation_id
        - version
        - demand_signal_source
        - recommended_option
        - score
        - scoring_weights
        - evidence
        - scoring_breakdown
        - rejected_options
        - feasibility_result
        - input_snapshot
        - created_at
        - is_synthetic
      properties:
        recommendation_id:
          type: string
          format: uuid
        workflow_id:
          type: string
          format: uuid
        correlation_id:
          type: string
          format: uuid
        version:
          type: integer
        demand_signal_source:
          $ref: "#/components/schemas/DemandSignalSource"
        recommended_option:
          $ref: "#/components/schemas/OptionType"
        score:
          type: number
        scoring_weights:
          $ref: "#/components/schemas/ScoringWeights"
        evidence:
          type: object
          additionalProperties: true
        scoring_breakdown:
          $ref: "#/components/schemas/ScoringBreakdown"
        rejected_options:
          type: array
          items:
            $ref: "#/components/schemas/RejectedOption"
        feasibility_result:
          type: object
          additionalProperties: true
        input_snapshot:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        is_synthetic:
          type: boolean

    RecommendationListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RecommendationDetail"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    # -----------------------------------------------------------------------
    # Approval Schemas
    # -----------------------------------------------------------------------
    ApprovalRequest:
      type: object
      required: [recommendation_id, decision, approver]
      properties:
        recommendation_id:
          type: string
          format: uuid
        decision:
          $ref: "#/components/schemas/ApprovalDecisionEnum"
        approver:
          type: string
          minLength: 1
        reason:
          type: string
          nullable: true

    ApprovalResponse:
      type: object
      required:
        - approval_id
        - recommendation_id
        - correlation_id
        - recommendation_version
        - decision
        - approver
        - policy_version
        - input_snapshot
        - decided_at
      properties:
        approval_id:
          type: string
          format: uuid
        recommendation_id:
          type: string
          format: uuid
        correlation_id:
          type: string
          format: uuid
        recommendation_version:
          type: integer
        decision:
          $ref: "#/components/schemas/ApprovalDecisionEnum"
        approver:
          type: string
        reason:
          type: string
          nullable: true
        policy_version:
          type: string
        input_snapshot:
          type: object
          additionalProperties: true
        decided_at:
          type: string
          format: date-time

    # -----------------------------------------------------------------------
    # Task Schemas
    # -----------------------------------------------------------------------
    TaskStateLogEntry:
      type: object
      required: [to_state, actor, transitioned_at]
      properties:
        from_state:
          $ref: "#/components/schemas/DeliveryTaskState"
        to_state:
          $ref: "#/components/schemas/DeliveryTaskState"
        actor:
          type: string
        reason:
          type: string
          nullable: true
        transitioned_at:
          type: string
          format: date-time

    TaskDetail:
      type: object
      required:
        - task_id
        - correlation_id
        - recommendation_id
        - recommendation_version
        - task_type
        - current_state
        - medication_id
        - destination_location_id
        - quantity
        - created_at
        - updated_at
        - state_history
        - is_synthetic
      properties:
        task_id:
          type: string
          format: uuid
        correlation_id:
          type: string
          format: uuid
        recommendation_id:
          type: string
          format: uuid
        recommendation_version:
          type: integer
        task_type:
          $ref: "#/components/schemas/OptionType"
        current_state:
          $ref: "#/components/schemas/DeliveryTaskState"
        medication_id:
          type: string
          format: uuid
        source_location_id:
          type: string
          format: uuid
          nullable: true
        destination_location_id:
          type: string
          format: uuid
        quantity:
          type: number
        assigned_to:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true
        state_history:
          type: array
          items:
            $ref: "#/components/schemas/TaskStateLogEntry"
        is_synthetic:
          type: boolean

    TaskListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TaskDetail"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    TaskTransitionRequest:
      type: object
      required: [to_state, actor]
      properties:
        to_state:
          $ref: "#/components/schemas/DeliveryTaskState"
        actor:
          type: string
          minLength: 1
        reason:
          type: string
          nullable: true

    # -----------------------------------------------------------------------
    # Scenario Schemas
    # -----------------------------------------------------------------------
    ScenarioDetail:
      type: object
      required:
        - scenario_id
        - scenario_number
        - name
        - description
        - is_active
      properties:
        scenario_id:
          type: string
          format: uuid
        scenario_number:
          type: integer
          minimum: 1
          maximum: 7
        name:
          type: string
        description:
          type: string
        is_active:
          type: boolean
        last_run_at:
          type: string
          format: date-time
          nullable: true
        last_run_status:
          type: string
          nullable: true
          enum: [passed, failed, running, null]

    ScenarioListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ScenarioDetail"

    ScenarioRunResponse:
      type: object
      required: [scenario_number, run_id, status]
      properties:
        scenario_number:
          type: integer
        run_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [running]
        message:
          type: string

    # -----------------------------------------------------------------------
    # Detection Schemas
    # -----------------------------------------------------------------------
    DetectionEventResponse:
      type: object
      required:
        - detection_event_id
        - detection_type
        - medication_id
        - location_id
        - detected_at
        - demand_signal_source
        - correlation_id
        - details
        - is_synthetic
      properties:
        detection_event_id:
          type: string
          format: uuid
        detection_type:
          $ref: "#/components/schemas/DetectionType"
        medication_id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        detected_at:
          type: string
          format: date-time
        demand_signal_source:
          $ref: "#/components/schemas/DemandSignalSource"
        correlation_id:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true
        is_synthetic:
          type: boolean

    DetectionEventListResponse:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DetectionEventResponse"
        pagination:
          $ref: "#/components/schemas/PaginationMeta"

    # -----------------------------------------------------------------------
    # Forecasting Schemas
    # -----------------------------------------------------------------------
    DemandSignalResponse:
      type: object
      required:
        - effective_daily_demand
        - demand_signal_source
      properties:
        effective_daily_demand:
          type: number
        demand_signal_source:
          $ref: "#/components/schemas/DemandSignalSource"
        forecast_confidence:
          type: number
          nullable: true
        forecast_id:
          type: string
          format: uuid
          nullable: true
        fallback_reason:
          type: string
          nullable: true

    ForecastPointResponse:
      type: object
      required: [forecast_date, p10, p50, p90]
      properties:
        forecast_date:
          type: string
          format: date
        p10:
          type: number
        p50:
          type: number
        p90:
          type: number

    ForecastPointsResponse:
      type: object
      required: [medication_id, location_id, points]
      properties:
        medication_id:
          type: string
          format: uuid
        location_id:
          type: string
          format: uuid
        points:
          type: array
          items:
            $ref: "#/components/schemas/ForecastPointResponse"

    # -----------------------------------------------------------------------
    # KPI Schemas
    # -----------------------------------------------------------------------
    KpiSnapshotResponse:
      type: object
      required: [kpi_name, kpi_value, snapshot_at]
      properties:
        kpi_name:
          type: string
        kpi_value:
          type: number
        dimensions:
          type: object
          additionalProperties: true
        snapshot_at:
          type: string
          format: date-time

    KpiListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/KpiSnapshotResponse"
