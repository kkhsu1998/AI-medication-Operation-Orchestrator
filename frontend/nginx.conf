# Serves the built SPA and proxies API calls to the backend container,
# so the frontend needs no VITE_API_URL (same-origin requests).
server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: every route renders index.html.
    location / {
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://backend:8000;
    }
}
